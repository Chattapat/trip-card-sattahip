                height: 100%;

            .staticrypt-content::after {
                content: '';
                position: absolute;
                border-radius: 50%;
                pointer-events: none;
                background: radial-gradient(circle at 28% 28%,
                    rgba(255,255,255,0.95) 0%,
                    rgba(255,255,255,0.35) 18%,
                    color-mix(in srgb, var(--tide) 30%, transparent) 50%,
                    color-mix(in srgb, var(--tide) 10%, transparent) 90%);
                border: 1px solid color-mix(in srgb, var(--tide) 40%, transparent);
                box-shadow:
                    inset 1px 1px 3px rgba(255,255,255,0.7),
                    0 0 14px color-mix(in srgb, var(--tide) 35%, transparent);
                animation: gate-float 9s ease-in-out infinite;
            }
            .staticrypt-content::before {
                width: 96px;
                height: 96px;
                top: 12%;
                left: 8%;
                animation-delay: 0s;
            }
            .staticrypt-content::after {
                width: 64px;
                height: 64px;
                bottom: 14%;
                right: 10%;
                animation-delay: 3.5s;
                background: radial-gradient(circle at 28% 28%,
                    rgba(255,255,255,0.95) 0%,
                    color-mix(in srgb, var(--ember) 30%, transparent) 50%,
                    transparent 90%);
                border-color: color-mix(in srgb, var(--ember) 40%, transparent);
                box-shadow:
                    inset 1px 1px 3px rgba(255,255,255,0.7),
                    0 0 14px color-mix(in srgb, var(--ember) 35%, transparent);
            }

            }

                width: 100%;
                max-width: 440px;
                margin: 0 auto;
                padding: clamp(2.5rem, 8vh, 6rem) 1.5rem 2rem;
                box-sizing: border-box;
                position: relative;
                z-index: 1;

                font-weight: 400;
                color: var(--tide);

                font-size: 0.875rem;
                color: var(--ink-2);
                line-height: 1.6;

                margin: 1.5rem 0;
                border: 0;
                border-top: 1px solid var(--hairline);
            }

                position: relative;
                background: var(--surface-2);
                border: 1px solid var(--hairline);
                border-radius: 2px;
                margin: 0 0 1rem;
                transition: border-color 200ms ease;

                background: transparent;
                border: 0;
                font-family: 'JetBrains Mono', ui-monospace, monospace;

                outline: 0;
                padding: 14px 44px 14px 14px;

                color: var(--ink);

                color: var(--ink-4);
                font-family: 'Inter', sans-serif;
            }

                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.55;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 160ms ease;
                filter: invert(50%);

            @media (prefers-color-scheme: dark) {
                .staticrypt-toggle-password-visibility { filter: invert(80%); }
            }

                display: flex;
                align-items: center;
                margin-bottom: 1.25rem;
                font-size: 13px;
                color: var(--ink-3);
                cursor: pointer;

            .staticrypt-remember input[type="checkbox"] {

                margin-right: 0.75rem;
                accent-color: var(--tide);

                outline: 0;
                background: var(--ink);

                font-size: 11px;
                font-weight: 500;

                color: var(--ink-4);

                .staticrypt-form input[type="text"] { font-size: 16px; }
            }
